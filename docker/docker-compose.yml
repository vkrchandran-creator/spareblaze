version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: spareblaze_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: spareblaze
      POSTGRES_PASSWORD: spareblaze_dev
      POSTGRES_DB: spareblaze
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Uncomment after Phase 2 backend is built:
  # api:
  #   build:
  #     context: ../backend
  #     dockerfile: ../docker/Dockerfile.backend
  #   container_name: spareblaze_api
  #   restart: unless-stopped
  #   env_file: ../backend/.env
  #   ports:
  #     - '5000:5000'
  #   depends_on:
  #     - db

volumes:
  pgdata:
